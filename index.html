<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Приглашение на день рождения</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Движущиеся шарики */
    .balloon {
      position: fixed;
      bottom: -100px;
      width: 40px;
      height: 50px;
      background: red;
      border-radius: 50%;
      animation: rise 10s linear infinite;
      opacity: 0.7;
    }

    @keyframes rise {
      to {
        transform: translateY(-120vh);
      }
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      max-width: 420px;
      width: 90%;
      animation: fadeIn 1.5s ease;
      z-index: 2;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);} 
      to {opacity: 1; transform: translateY(0);} 
    }

    h1 { color: #ff4d6d; }

    .date { font-weight: bold; margin: 10px 0; }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: #ff4d6d;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover { transform: scale(1.1); }

    .confetti, .firework {
      position: fixed;
      width: 10px;
      height: 10px;
      top: 0;
    }

    .confetti {
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
      }
    }

    .firework {
      border-radius: 50%;
      animation: explode 1s ease-out forwards;
    }

    @keyframes explode {
      from { transform: scale(0); opacity: 1; }
      to { transform: scale(5); opacity: 0; }
    }

  </style>
</head>
<body>

  <!-- Шарики -->
  <script>
    for (let i = 0; i < 15; i++) {
      const b = document.createElement('div');
      b.className = 'balloon';
      b.style.left = Math.random()*100 + 'vw';
      b.style.background = `hsl(${Math.random()*360},100%,60%)`;
      b.style.animationDuration = (6 + Math.random()*5) + 's';
      document.body.appendChild(b);
    }
  </script>

  <div class="card">
    <h1>🎉 Юлия приглашает 🎉</h1>
    <p>Ты приглашён(а) на мой день рождения!</p>
    <div class="date">📅 10 апреля | ⏰ 20:00</div>
    <p>📍 Кафе Gakku<br>ул. Коркыт ата 42</p>
    <p>Будет весело, жду тебя! 🎂</p>
    <div class="btn" onclick="celebrate()">Я приду 🎉</div>
  </div>

  <audio id="music" src="https://dl.sndup.net/7x4k/Туған%20күн.mp3"></audio>

  <script>
    function celebrate() {
      document.getElementById('music').play();

      // конфетти
      for (let i = 0; i < 60; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random()*100 + 'vw';
        c.style.background = `hsl(${Math.random()*360},100%,50%)`;
        c.style.animationDuration = (2+Math.random()*2)+'s';
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),3000);
      }

      // салют
      for (let i = 0; i < 20; i++) {
        const f = document.createElement('div');
        f.className = 'firework';
        f.style.left = Math.random()*100 + 'vw';
        f.style.top = Math.random()*50 + 'vh';
        f.style.background = `hsl(${Math.random()*360},100%,60%)`;
        document.body.appendChild(f);
        setTimeout(()=>f.remove(),1000);
      }
    }
  </script>

</body>
</html>
